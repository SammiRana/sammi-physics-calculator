<!DOCTYPE html>
<html>
<head>
<meta name="google-site-verification" content="zLeU2RGnmVODxZMO64Hm9cAwMRanfisVDO9vCJH9cZ8"> 
<title>Sammi Physics Calculator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
font-family: Arial;
background:linear-gradient(135deg,#4facfe,#00f2fe);
text-align:center;
margin:0;
padding:0;
}
h2{
color:white;
font-size:32px
margin-top:30px;
}
  
.container{
width:90%px;
max-width:400px;  
margin:auto;
margin-top:50px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0px 5px 15px 
rgba(0,0,0,0.2);  
}
h3{
color:#333;
border-bottom:2px solid #4facfe;
padding-botton:5px;
}  
input{
width:85%;
padding:10px;
margin:6px;
border:1px solid #ccc;
outline:none;
}  
input:focus{
border-color:#4facfe;
box-shadow:0 0 5px #4facfe;
}
button{
padding:10px 18px;
margin:8px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#4facfe,#00c6ff);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}
button:hover{
transform:scale(1.05);
}  

.result{
margin-top:10px;
font-weight:bold;
color:#0077ff;
font-size:18px;
}  

</style>

</head>

<body>

<h2>Sammi Physics Calculator</h2>

<div class="container">

<h3>Force Calculator</h3>

<input id="mass" placeholder="Mass (kg)">
<br>

<input id="acc" placeholder="Acceleration (m/s²)">
<br>

  
<button onclick="force()">Calculate Force</button>

<div class="result" id="forceResult"></div>

<hr>

<h3>Velocity Calculator</h3>

<input id="distance" placeholder="Distance (m)">
<br>

<input id="time" placeholder="Time (s)">
<br>

<button onclick="velocity()">Calculate Velocity</button>

<div class="result" id="velocityResult"></div>

<hr>

<h3>Density Calculator</h3>

<input id="mass2" placeholder="Mass (kg)">
<br>

<input id="volume" placeholder="Volume (m³)">
<br>

<button onclick="density()">Calculate Density</button>

<div class="result" id="densityResult"></div>

</div>

<script>

function force(){

let m = document.getElementById("mass").value
let a = document.getElementById("acc").value

let f = m * a

document.getElementById("forceResult").innerHTML =
"Force = " + f + " Newton"

}

function velocity(){

let d = document.getElementById("distance").value
let t = document.getElementById("time").value

let v = d / t

document.getElementById("velocityResult").innerHTML =
"Velocity = " + v + " m/s"

}

function density(){

let m = document.getElementById("mass2").value
let v = document.getElementById("volume").value

let d = m / v

document.getElementById("densityResult").innerHTML =
"Density = " + d + " kg/m³"

}

</script>

</body>

</html>
